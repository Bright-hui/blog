<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="//cdn.bootcdn.net/ajax/libs/vue/3.2.0-beta.7/vue.global.min.js"></script>
    <script src="/blog/js/iframe-child.js"></script>
</head>
<body style="border: 1px solid lightgray;padding:20px;">

<div id="app"></div>


<script>

    const { createApp, reactive } = Vue;
    const app = createApp({
        template: `<div>
        <div>{{data.name}}</div>
        <button @click="changeName()">changeName</button>
        </div>`,
        setup() {
            const data = reactive({
                name: 'huihui',
            });
            const changeName = () => {
                data.name = 'new name';
            };
            return {data, changeName};
        }
    });

    app.mount('#app')

</script>

</body>
</html>
