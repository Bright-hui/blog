<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="/blog/js/iframe-child.js"></script>
    <style>
        body {
            padding: 0;
            margin: 0;
        }
        .box-container {
            position: relative;
            height: 0;
        }
        .box {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
        }
        .box-info {
            position: absolute;
            right: 5px;
            top: 5px;
            color: white;
        }

        #box1-container {
            padding-bottom: 50%;
        }
        #box1 {
            background-color: #8cc665;
        }
    </style>
</head>
<body>

<div style="margin-bottom: 20px;">
    窗口容器宽度
    <select id="browser-window" onchange="onSelect()">
        <option value="30%">30%</option>

        <option value="50%">50%</option>
        <option value="70%">70%</option>
        <option value="80%">80%</option>
        <option value="90%">90%</option>

        <option selected value="100%">100%</option>
    </select>
</div>
<script>
    const mySelect = document.getElementById("browser-window");
    function onSelect() {
        const index= mySelect.selectedIndex;
        const value = mySelect.options[index].value;
        document.body.style.width = value;
        postCurrentHeight();
        box1();
    }
</script>

<div class="box-container" id="box1-container">
    <div class="box" id="box1">
        <div class="box-info"></div>
    </div>
</div>
<script>
    function box1() {
        const container = document.getElementById('box1');
        const info = container.querySelector('.box-info');
        info.innerHTML = `
        <span>${container.clientWidth}</span>
        <span>x</span>
        <span>${container.clientHeight}</span>
        `;
    }
    box1();

</script>


<script>
    function init() {
        setTimeout(() => {
            postCurrentHeight();
        }, 0);
    }

        init();

</script>

</body>
</html>
